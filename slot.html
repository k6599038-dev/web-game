<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラウンド3 スロット — GRAND ROYAL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a84c;--gold-light:#f0d080;
    --dark:#0a0a0f;--dark2:#12121a;--dark3:#1c1c28;
    --card-bg:#181824;--text:#e8e4d8;--text-muted:#888070;
    --red:#e74c3c;--green:#2ecc71;--border:rgba(201,168,76,0.2);
    --slot-bg:#0d0d18;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse at 50% 10%,rgba(201,168,76,0.1) 0%,transparent 50%);
    pointer-events:none;}

  .game-header{
    background:var(--card-bg);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:14px 24px;
    position:sticky;top:0;z-index:100;
  }
  .game-header .title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold-light);}
  .round-badge{background:linear-gradient(135deg,#c9a84c,#e6b94a);color:var(--dark);padding:4px 14px;border-radius:20px;font-size:0.78rem;font-weight:700;}
  .money-display{font-size:0.9rem;color:var(--gold);font-weight:700;}

  .container{max-width:760px;margin:0 auto;padding:24px 16px 60px;}

  /* ─── スロットマシン本体 ─── */
  .slot-machine{
    background:linear-gradient(180deg,#1a1025 0%,#0d0d18 100%);
    border:3px solid;
    border-color:#4a3020 #8a6030 #8a6030 #4a3020;
    border-radius:24px;
    padding:28px 24px;
    margin-bottom:20px;
    box-shadow:
      inset 0 2px 8px rgba(255,255,255,0.05),
      0 8px 40px rgba(0,0,0,0.7);
    position:relative;overflow:hidden;
  }
  .slot-machine::before{
    content:'GRAND ROYAL';
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    font-family:'Playfair Display',serif;font-size:0.85rem;
    background:linear-gradient(135deg,#c9a84c,#f0d080);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;letter-spacing:0.3em;white-space:nowrap;
  }

  /* ─── リール ─── */
  .reels-wrapper{
    display:flex;gap:8px;justify-content:center;margin:28px 0 20px;
    background:rgba(0,0,0,0.6);border-radius:16px;
    padding:16px;border:2px solid rgba(201,168,76,0.15);
    position:relative;
  }
  /* 当たりライン */
  .reels-wrapper::before,.reels-wrapper::after{
    content:'';position:absolute;left:12px;right:12px;height:2px;
    background:linear-gradient(90deg,transparent,rgba(201,168,76,0.6),transparent);
  }
  .reels-wrapper::before{top:calc(50% - 1px);}
  .reels-wrapper::after{display:none;}

  .reel-container{
    width:90px;overflow:hidden;border-radius:10px;
    background:var(--dark);border:2px solid rgba(255,255,255,0.05);
    height:90px;position:relative;
  }
  .reel-container.wild{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.5);}
  .reel{
    display:flex;flex-direction:column;align-items:center;
    transition:none;
  }
  .reel.spinning{
    animation:reelSpin var(--dur,0.08s) linear infinite;
  }
  @keyframes reelSpin{
    0%{transform:translateY(0);}
    100%{transform:translateY(-90px);}
  }
  .symbol{
    width:90px;height:90px;
    display:flex;align-items:center;justify-content:center;
    font-size:3rem;flex-shrink:0;
  }

  /* ─── 当たりアニメーション ─── */
  .win-flash{
    animation:winFlash 0.5s ease-in-out 3;
  }
  @keyframes winFlash{
    0%,100%{background:rgba(0,0,0,0.6);}
    50%{background:rgba(201,168,76,0.2);}
  }
  .jackpot-flash{
    animation:jackpotFlash 0.3s ease-in-out 6;
  }
  @keyframes jackpotFlash{
    0%,100%{background:rgba(0,0,0,0.6);}
    50%{background:rgba(255,215,0,0.4);}
  }

  /* ─── ベット & コントロール ─── */
  .bet-section{
    background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
    padding:20px;margin-bottom:16px;
  }
  .bet-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
  .bet-label{font-size:0.78rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;}
  .bet-input-row{display:flex;gap:6px;flex-wrap:wrap;}
  .bet-option{
    padding:8px 16px;border-radius:8px;border:1px solid var(--border);
    background:var(--dark3);color:var(--text);font-size:0.85rem;cursor:pointer;
    transition:all .15s;font-family:'Noto Sans JP',sans-serif;
  }
  .bet-option:hover{border-color:var(--gold);color:var(--gold);}
  .bet-option.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}

  .spins-info{
    display:flex;gap:16px;font-size:0.85rem;flex-wrap:wrap;
  }
  .spins-info span{color:var(--text-muted);}
  .spins-info strong{color:var(--gold-light);}

  /* ─── スピンボタン ─── */
  .spin-btn-big{
    width:100%;padding:18px;border-radius:12px;border:none;
    font-size:1.2rem;font-family:'Playfair Display',serif;font-weight:700;
    cursor:pointer;letter-spacing:0.1em;
    background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);
    color:var(--dark);
    transition:all .2s;
    box-shadow:0 4px 20px rgba(201,168,76,0.25);
    margin-bottom:12px;
  }
  .spin-btn-big:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,0.4);}
  .spin-btn-big:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

  /* ─── アイテム使用 ─── */
  .items-bar{
    background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
    padding:16px 20px;margin-bottom:16px;
  }
  .items-bar h3{font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;letter-spacing:0.05em;}
  .items-list{display:flex;gap:8px;flex-wrap:wrap;}
  .item-pill{
    padding:8px 14px;border-radius:20px;border:1px solid var(--border);
    background:var(--dark3);font-size:0.8rem;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:all .15s;
  }
  .item-pill:hover{border-color:var(--gold);}
  .item-pill.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}
  .item-pill.used{opacity:0.35;pointer-events:none;text-decoration:line-through;}
  .item-count{
    background:var(--gold);color:var(--dark);
    border-radius:8px;padding:1px 6px;font-size:0.68rem;font-weight:700;
  }
  .no-items{font-size:0.85rem;color:var(--text-muted);}

  /* ─── 結果表示 ─── */
  .spin-result{
    text-align:center;min-height:60px;
    display:flex;align-items:center;justify-content:center;
    font-size:1rem;color:var(--gold-light);
    margin-bottom:12px;
    font-family:'Playfair Display',serif;
  }

  /* ─── プレイヤーランキング ─── */
  .ranking-section{
    background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
    padding:20px;margin-bottom:16px;
  }
  .ranking-section h3{
    font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold-light);
    margin-bottom:16px;display:flex;align-items:center;gap:12px;
  }
  .ranking-section h3::after{content:'';flex:1;height:1px;background:var(--border);}
  .rank-row{
    display:flex;align-items:center;gap:12px;
    padding:10px 0;border-bottom:1px solid var(--border);
  }
  .rank-row:last-child{border-bottom:none;}
  .rank-num{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:0.8rem;font-weight:700;flex-shrink:0;
  }
  .rank-1{background:var(--gold);color:var(--dark);}
  .rank-2{background:#c0c0c0;color:var(--dark);}
  .rank-3{background:#cd7f32;color:white;}
  .rank-other{background:var(--dark3);color:var(--text-muted);}
  .rank-name{flex:1;font-size:0.9rem;}
  .rank-money{font-size:1rem;color:var(--gold);font-weight:700;}

  /* ─── 最終結果 ─── */
  .final-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.9);z-index:300;
    align-items:center;justify-content:center;
  }
  .final-overlay.show{display:flex;}
  .final-box{
    background:var(--card-bg);border:2px solid var(--gold);border-radius:24px;
    padding:40px;text-align:center;max-width:520px;width:90%;
    position:relative;overflow:hidden;
  }
  .final-box::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.15) 0%,transparent 60%);
    pointer-events:none;
  }
  .final-box h2{
    font-family:'Playfair Display',serif;font-size:2.5rem;
    background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;margin-bottom:8px;
  }
  .winner-name{
    font-size:2rem;font-weight:700;color:var(--gold-light);margin:16px 0;
    font-family:'Playfair Display',serif;
  }
  .final-ranking{text-align:left;margin:20px 0;}

  /* ─── 花火エフェクト ─── */
  .firework{
    position:fixed;pointer-events:none;z-index:400;
    animation:fwBurst .8s ease-out forwards;
  }
  @keyframes fwBurst{
    0%{transform:scale(0);opacity:1;}
    100%{transform:scale(1);opacity:0;}
  }

  .btn{padding:14px 32px;border-radius:10px;border:none;font-size:0.95rem;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);color:var(--dark);}
  .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.3);}
  .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
  .btn-outline:hover{background:rgba(201,168,76,0.08);}
</style>
</head>
<body>

<div class="game-header">
  <span class="title">🎰 スロット</span>
  <span class="round-badge">FINAL ROUND 3 / 3</span>
  <span class="money-display" id="header-money">¥10,000</span>
</div>

<div class="container">

  <!-- スロットマシン -->
  <div class="slot-machine">
    <div class="reels-wrapper" id="reels-wrapper">
      <div class="reel-container" id="rc0"><div class="reel" id="reel-0"><div class="symbol">🍒</div></div></div>
      <div class="reel-container" id="rc1"><div class="reel" id="reel-1"><div class="symbol">⭐</div></div></div>
      <div class="reel-container" id="rc2"><div class="reel" id="reel-2"><div class="symbol">7️⃣</div></div></div>
    </div>

    <div class="spin-result" id="spin-result">スピンしてください！</div>

    <!-- ベット設定 -->
    <div class="bet-section">
      <div class="bet-row">
        <span class="bet-label">ベット額</span>
        <div class="bet-input-row">
          <div class="bet-option active" onclick="setBet(200)">¥200</div>
          <div class="bet-option" onclick="setBet(500)">¥500</div>
          <div class="bet-option" onclick="setBet(1000)">¥1,000</div>
          <div class="bet-option" onclick="setBet(2000)">¥2,000</div>
          <div class="bet-option" onclick="setBet(5000)">¥5,000</div>
        </div>
      </div>
      <div class="spins-info">
        <span>残りスピン: <strong id="spins-left">5</strong></span>
        <span>消費済み: <strong id="spins-used">0</strong></span>
      </div>
    </div>

    <button class="spin-btn-big" id="spin-btn" onclick="doSpin()">🎰 SPIN！</button>
  </div>

  <!-- アイテム使用 -->
  <div class="items-bar">
    <h3>🎒 アイテム（クリックで使用）</h3>
    <div class="items-list" id="items-list">
      <span class="no-items">アイテムなし</span>
    </div>
  </div>

  <!-- プレイヤーランキング（リアルタイム）-->
  <div class="ranking-section">
    <h3>📊 現在の所持金ランキング</h3>
    <div id="ranking-list"></div>
  </div>

  <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-top:8px" id="end-status"></p>
</div>

<!-- 最終結果 -->
<div class="final-overlay" id="final-overlay">
  <div class="final-box">
    <h2>🏆 GAME OVER 🏆</h2>
    <p style="color:var(--text-muted);margin-bottom:8px">最終結果</p>
    <div class="winner-name" id="final-winner"></div>
    <p style="color:var(--gold);font-size:0.9rem;margin-bottom:20px">が優勝！</p>
    <div class="final-ranking" id="final-ranking"></div>
    <button class="btn btn-gold" style="width:100%;margin-top:20px" onclick="location.href='index.html'">🏠 ロビーへ戻る</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// ─── スロットシンボル ───
const SYMBOLS=['🍒','🍋','🍊','🔔','⭐','💎','7️⃣','🃏'];
const PAYOUTS={
  '🍒🍒🍒':{name:'チェリー3つ',mult:3},
  '🍋🍋🍋':{name:'レモン3つ',mult:3},
  '🍊🍊🍊':{name:'オレンジ3つ',mult:4},
  '🔔🔔🔔':{name:'ベル3つ',mult:5},
  '⭐⭐⭐':{name:'スター3つ',mult:8},
  '💎💎💎':{name:'ダイヤ3つ',mult:15},
  '7️⃣7️⃣7️⃣':{name:'ラッキー7！',mult:25},
  '🃏🃏🃏':{name:'ジャックポット！！',mult:50},
};
const JACKPOT='🃏🃏🃏';

// ─── 状態 ───
const roomId=getRoomId();
const playerId=getPlayerId();
let myMoney=0;
let myItems=[];
let allPlayers={};
let selectedBet=200;
let spinsLeft=5;
let spinsUsed=0;
let activeItems=new Set();
let usedItems=new Set();
let isSpinning=false;
let gameEnded=false;
let spinsFinishedPlayers=new Set();

if(!roomId) location.href='index.html';

// ─── Firebase監視 ───
db.ref('rooms/'+roomId+'/players').on('value',snap=>{
  allPlayers=snap.val()||{};
  const me=allPlayers[playerId];
  if(me){
    myMoney=me.money;
    myItems=me.items||[];
    document.getElementById('header-money').textContent=formatMoney(myMoney);
  }
  renderRanking();
  renderItems();
  checkAllDone();
});

db.ref('rooms/'+roomId+'/slot/finished').on('value',snap=>{
  const finished=snap.val()||{};
  spinsFinishedPlayers=new Set(Object.keys(finished).filter(k=>finished[k]));
  checkAllDone();
});

// ─── ベット設定 ───
function setBet(v){
  selectedBet=v;
  document.querySelectorAll('.bet-option').forEach(b=>{
    b.classList.toggle('active',b.textContent.includes(v.toLocaleString()));
  });
}

// ─── アイテム描画 ───
function renderItems(){
  const list=document.getElementById('items-list');
  if(!myItems.length){list.innerHTML='<span class="no-items">アイテムなし</span>';return;}
  list.innerHTML=myItems.map((item,i)=>`
    <div class="item-pill${activeItems.has(i)?' active':''}${usedItems.has(i)?' used':''}"
         onclick="toggleItem(${i})">
      ${item.icon} ${item.name}
      ${item.count>1?`<span class="item-count">×${item.count}</span>`:''}
    </div>`).join('');
}

function toggleItem(i){
  if(usedItems.has(i))return;
  if(activeItems.has(i)){activeItems.delete(i);}else{activeItems.add(i);}
  renderItems();
}

// ─── アイテム効果取得 ───
function getMultiplierFromItems(){
  let mult=1;
  activeItems.forEach(i=>{
    const item=myItems[i];
    if(!item)return;
    if(item.effect==='mult_all_3x') mult*=3;
    if(item.effect==='mult_2x') mult*=2;
    if(item.effect==='mult_1.3x') mult*=1.3;
    if(item.effect==='next_mult_plus0.5') mult+=0.5;
    if(item.effect==='cherry_plus1'){/* handled in payout*/}
  });
  return mult;
}

function hasExtraSpin(){
  for(const i of activeItems){
    const item=myItems[i];
    if(item?.effect?.startsWith('extra_spin')){
      const extra=parseInt(item.effect.split('_')[2])||0;
      return extra;
    }
  }
  return 0;
}

function hasWildReel(){
  for(const i of activeItems){
    if(myItems[i]?.effect==='wild_reel') return true;
  }
  return false;
}

function hasJackpot5x(){
  for(const i of activeItems){
    if(myItems[i]?.effect==='jackpot_5x') return true;
  }
  return false;
}

function hasConsolation(){
  for(const i of activeItems){
    if(myItems[i]?.effect==='consolation') return true;
  }
  return false;
}

// ─── スピン ───
async function doSpin(){
  if(isSpinning||spinsLeft<=0||gameEnded) return;
  if(selectedBet>myMoney){
    document.getElementById('spin-result').textContent='所持金が足りません';return;
  }
  isSpinning=true;
  document.getElementById('spin-btn').disabled=true;

  // ベット消費
  const betAmount=selectedBet;
  myMoney-=betAmount;
  await db.ref('rooms/'+roomId+'/players/'+playerId+'/money').set(myMoney);
  document.getElementById('header-money').textContent=formatMoney(myMoney);

  // ジャックポット確率調整
  const jpBoost=hasJackpot5x();
  const wildReel=hasWildReel();

  // リール結果生成
  let results=[];
  for(let r=0;r<3;r++){
    if(wildReel&&r===0){
      results.push('🃏');// 1リール目ワイルド
    } else {
      const pool=[...SYMBOLS,...SYMBOLS,...SYMBOLS,'7️⃣','7️⃣'];
      if(jpBoost) pool.push('🃏','🃏','🃏','🃏','🃏');
      results.push(pool[Math.floor(Math.random()*pool.length)]);
    }
  }

  // リールアニメーション
  await animateReels(results);

  // 当たり判定
  const key=results.join('');
  let payout=PAYOUTS[key];
  let winnings=0;
  const itemMult=getMultiplierFromItems();

  if(payout){
    let baseMult=payout.mult;
    // チェリーブースト
    if(key==='🍒🍒🍒'){
      activeItems.forEach(i=>{if(myItems[i]?.effect==='cherry_plus1')baseMult+=1;});
    }
    winnings=Math.floor(betAmount*baseMult*itemMult);
    document.getElementById('spin-result').textContent=`✨ ${payout.name}！ +${formatMoney(winnings)}`;

    // 当たりエフェクト
    const rw=document.getElementById('reels-wrapper');
    rw.classList.add(key===JACKPOT?'jackpot-flash':'win-flash');
    setTimeout(()=>rw.classList.remove('win-flash','jackpot-flash'),2000);

    if(key===JACKPOT) spawnFireworks();
  } else {
    // はずれ
    if(hasConsolation()){winnings=Math.floor(betAmount*0.1);}
    const twoMatch=results[0]===results[1]||results[1]===results[2]||results[0]===results[2];
    document.getElementById('spin-result').textContent=twoMatch?`惜しい！ ${results.join(' ')}`+(winnings?` +${formatMoney(winnings)}`:''):`ハズレ ${results.join(' ')}`+(winnings?` +${formatMoney(winnings)}`:'');
  }

  // お金反映
  myMoney+=winnings;
  await db.ref('rooms/'+roomId+'/players/'+playerId+'/money').set(myMoney);
  document.getElementById('header-money').textContent=formatMoney(myMoney);

  // アイテム消費
  activeItems.forEach(i=>{usedItems.add(i);});
  activeItems.clear();
  renderItems();

  // スピン回数更新
  spinsUsed++;
  spinsLeft--;
  const extraSpins=hasExtraSpin();
  if(extraSpins>0&&!usedItems.has([...activeItems][0])){spinsLeft+=extraSpins;}
  document.getElementById('spins-left').textContent=spinsLeft;
  document.getElementById('spins-used').textContent=spinsUsed;

  isSpinning=false;

  if(spinsLeft<=0){
    document.getElementById('spin-btn').disabled=true;
    document.getElementById('spin-btn').textContent='スピン終了';
    document.getElementById('end-status').textContent='スピン終了！全員終わるまでお待ちください…';
    await db.ref('rooms/'+roomId+'/slot/finished/'+playerId).set(true);
  } else {
    document.getElementById('spin-btn').disabled=false;
  }
}

// ─── リールアニメーション ───
function animateReels(results){
  return new Promise(resolve=>{
    const delays=[0,300,600];
    results.forEach((sym,i)=>{
      const reel=document.getElementById('reel-'+i);
      reel.style.animationDuration='0.06s';
      reel.classList.add('spinning');
      setTimeout(()=>{
        reel.classList.remove('spinning');
        reel.innerHTML=`<div class="symbol">${sym}</div>`;
      },800+delays[i]);
    });
    setTimeout(resolve,1500);
  });
}

// ─── ランキング描画 ───
function renderRanking(){
  const sorted=Object.entries(allPlayers)
    .sort(([,a],[,b])=>b.money-a.money);
  const list=document.getElementById('ranking-list');
  list.innerHTML=sorted.map(([pid,p],i)=>{
    const cls=['rank-1','rank-2','rank-3','rank-other'][Math.min(i,3)];
    const num=i===0?'👑':i===1?'2':i===2?'3':'…';
    return `<div class="rank-row">
      <div class="rank-num ${cls}">${num}</div>
      <div class="rank-name">${p.name}${pid===playerId?' (あなた)':''}</div>
      <div class="rank-money">${formatMoney(p.money)}</div>
    </div>`;
  }).join('');
}

// ─── 全員終了チェック ───
function checkAllDone(){
  if(gameEnded)return;
  const total=Object.keys(allPlayers).length;
  if(total===0)return;
  if(spinsFinishedPlayers.size>=total){
    gameEnded=true;
    setTimeout(showFinalResult,1500);
  }
}

// ─── 最終結果 ───
function showFinalResult(){
  const sorted=Object.entries(allPlayers).sort(([,a],[,b])=>b.money-a.money);
  const winner=sorted[0];
  document.getElementById('final-winner').textContent=winner[1].name;
  document.getElementById('final-overlay').classList.add('show');

  const fr=document.getElementById('final-ranking');
  fr.innerHTML=sorted.map(([pid,p],i)=>{
    const medals=['🥇','🥈','🥉','4️⃣'];
    return `<div class="rank-row">
      <div style="font-size:1.5rem">${medals[i]||'　'}</div>
      <div style="flex:1;font-size:0.95rem">${p.name}${pid===playerId?' (あなた)':''}</div>
      <div style="color:var(--gold);font-weight:700">${formatMoney(p.money)}</div>
    </div>`;
  }).join('');

  spawnFireworks();
  spawnFireworks();
}

// ─── 花火エフェクト ───
function spawnFireworks(){
  const colors=['#f0d080','#c9a84c','#e74c3c','#2ecc71','#3498db','#9b59b6'];
  for(let i=0;i<12;i++){
    const fw=document.createElement('div');
    fw.className='firework';
    const size=40+Math.random()*60;
    fw.style.cssText=`
      left:${20+Math.random()*60}vw;
      top:${10+Math.random()*60}vh;
      width:${size}px;height:${size}px;
      border:3px solid ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:50%;
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${0.6+Math.random()*0.4}s;
    `;
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1200);
  }
}

// ─── 初期化 ───
window.addEventListener('DOMContentLoaded',async()=>{
  const snap=await db.ref('rooms/'+roomId+'/players/'+playerId).once('value');
  const p=snap.val();
  if(p){
    myMoney=p.money;
    myItems=p.items||[];
    document.getElementById('header-money').textContent=formatMoney(myMoney);
    renderItems();
  }
  // スピン数：アイテムのextra_spinを最初から加算
  const extraOnStart=myItems.reduce((s,item)=>{
    if(item.effect?.startsWith('extra_spin')) return s+parseInt(item.effect.split('_')[2]||0);
    return s;
  },0);
  spinsLeft=5+extraOnStart;
  document.getElementById('spins-left').textContent=spinsLeft;
});
</script>
